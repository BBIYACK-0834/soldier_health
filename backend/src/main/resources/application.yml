spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/teukgeupjeonsa?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  jackson:
    time-zone: Asia/Seoul

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:change-this-secret-key-change-this-secret-key}
  access-token-validity-seconds: ${JWT_ACCESS_TOKEN_VALIDITY_SECONDS:86400}

logging:
  level:
    org.hibernate.SQL: debug
    com.teukgeupjeonsa.backend.meal: info

public-meal:
  api:
    base-url: ${PUBLIC_MEAL_API_BASE_URL:https://openapi.mnd.go.kr}
    service-key: ${PUBLIC_MEAL_API_SERVICE_KEY:}
    rows: ${PUBLIC_MEAL_API_ROWS:200}
    type: ${PUBLIC_MEAL_API_TYPE:json}

meal-collector:
  openapi-list-url-template: ${MEAL_COLLECTOR_OPENAPI_LIST_URL_TEMPLATE:https://www.data.mil.kr/openapi/list.do?apiType=OPEN_API&search=%EC%8B%9D%EB%8B%A8&page={page}}
  max-pages: ${MEAL_COLLECTOR_MAX_PAGES:4}
  timeout-millis: ${MEAL_COLLECTOR_TIMEOUT:10000}
