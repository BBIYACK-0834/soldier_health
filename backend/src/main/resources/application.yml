spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/teukgeupjeonsa?serverTimezone=Asia/Seoul&useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  jackson:
    time-zone: Asia/Seoul

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:change-this-secret-key-change-this-secret-key}
  access-token-validity-seconds: ${JWT_ACCESS_TOKEN_VALIDITY_SECONDS:86400}

logging:
  level:
    org.hibernate.SQL: debug
    com.teukgeupjeonsa.backend.meal: info

public-meal:
  api:
    base-url: ${PUBLIC_MEAL_API_BASE_URL:https://openapi.mnd.go.kr}
    service-key: ${PUBLIC_MEAL_API_SERVICE_KEY:}
    rows: ${PUBLIC_MEAL_API_ROWS:200}
    type: ${PUBLIC_MEAL_API_TYPE:json}

meal-collector:
  timeout-millis: ${MEAL_COLLECTOR_TIMEOUT:10000}
  fixed-services: ${MEAL_COLLECTOR_FIXED_SERVICES:}
  atc-service-code: ${MEAL_COLLECTOR_ATC_SERVICE_CODE:DS_TB_MNDT_DATEBYMLSVC_ATC}
  standard-service-code: ${MEAL_COLLECTOR_STANDARD_SERVICE_CODE:DS_TB_MNDT_DATEBYMLSVC_STANDARD}
  auto-collect-cron: ${MEAL_COLLECTOR_AUTO_COLLECT_CRON:0 0 3 1 * *}
  auto-collect-zone: ${MEAL_COLLECTOR_AUTO_COLLECT_ZONE:Asia/Seoul}
