spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/teukgeupjeonsa?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  jackson:
    time-zone: Asia/Seoul

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:change-this-secret-key-change-this-secret-key}
  access-token-validity-seconds: ${JWT_ACCESS_TOKEN_VALIDITY_SECONDS:86400}

logging:
  level:
    org.hibernate.SQL: debug
    com.teukgeupjeonsa.backend.meal: info

mnd:
  api:
    base-url: ${MND_OPENAPI_BASE_URL:https://openapi.mnd.go.kr}
    key: ${MND_OPENAPI_KEY:}
    service-codes:
      - ${MND_OPENAPI_SERVICE_CODE_1:DS_TB_MNDT_DATEBYMLSVC_1570}
  meal-import:
    scheduler-enabled: ${MND_MEAL_IMPORT_SCHEDULER_ENABLED:false}
    scheduler-cron: ${MND_MEAL_IMPORT_SCHEDULER_CRON:0 0 5,17 * * *}
